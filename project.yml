name: HealthCoach
options:
  bundleIdPrefix: com.jannik
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"
  MarkdownUI:
    url: https://github.com/gonzalezreal/MarkdownUI
    from: "2.4.1"
targets:
  HealthCoach:
    type: application
    platform: iOS
    sources:
      - HealthCoach
    dependencies:
      - package: GRDB
      - package: MarkdownUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jannik.healthcoach
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_NSHealthShareUsageDescription: "HealthCoach reads your health data to display nutrition, activity, heart, and body metrics on your personal dashboard."
        CODE_SIGN_ENTITLEMENTS: HealthCoach/HealthCoach.entitlements
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    entitlements:
      path: HealthCoach/HealthCoach.entitlements
      properties:
        com.apple.developer.healthkit: true

  HealthCoachTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - HealthCoachTests
    dependencies:
      - target: HealthCoach
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: com.jannik.healthcoach.tests
